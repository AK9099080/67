<!DOCTYPE html>
<html>
<head>
    <style>
        /* The "67" Angled Motion */
        @keyframes angledBounce {
            0%   { transform: translate(0, 0) rotate(0deg); }
            25%  { transform: translate(-8px, -25px) rotate(-3deg); } /* Up & Left Tilt */
            50%  { transform: translate(8px, 15px) rotate(3deg); }    /* Down & Right Tilt */
            75%  { transform: translate(-4px, -10px) rotate(-1.5deg); } 
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .trigger-67 {
            animation: angledBounce 0.4s ease-in-out;
            animation-iteration-count: 2;
        }

        /* Centering the UI */
        body { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; font-family: sans-serif; 
        }
        #container { text-align: center; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; width: 200px; }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="logo">Google 67 Test</h1>
        <input type="text" id="search" placeholder="Type 67 and hit Enter">
    </div>

    <script>
        const input = document.getElementById('search');
        const container = document.getElementById('container');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value === '67') {
                // Clear old animation
                container.classList.remove('trigger-67');
                void container.offsetWidth; // Force restart
                // Start the angled bounce
                container.classList.add('trigger-67');
            }
        });
    </script>
</body>
</html>
