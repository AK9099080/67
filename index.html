<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* The Vertical Bounce Animation */
        @keyframes verticalBounce {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-20px); } /* Up */
            50% { transform: translateY(10px); }  /* Down */
            75% { transform: translateY(-10px); } /* Smaller Up */
        }

        .bounce-active {
            animation: verticalBounce 0.4s ease-in-out;
            animation-iteration-count: 3; /* Repeats for the "6-7" rhythm */
        }

        /* Basic styling to center everything */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #ffffff;
            font-family: sans-serif;
        }

        #page-content {
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div id="page-content">
        <h1>Type 67</h1>
        <input type="text" id="trigger" placeholder="Press Enter...">
    </div>

    <script>
        const input = document.getElementById('trigger');
        const content = document.getElementById('page-content');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value === '67') {
                // Reset animation
                content.classList.remove('bounce-active');
                void content.offsetWidth; // Trigger reflow
                // Start bounce
                content.classList.add('bounce-active');
            }
        });
    </script>
</body>
</html>
